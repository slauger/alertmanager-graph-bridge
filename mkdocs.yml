site_name: alertmanager-graph-bridge
site_description: A lightweight bridge between Prometheus Alertmanager and the Microsoft Graph API
site_url: https://slauger.github.io/alertmanager-graph-bridge/
repo_url: https://github.com/slauger/alertmanager-graph-bridge
repo_name: slauger/alertmanager-graph-bridge
copyright: Copyright Simon Lauger

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.code.annotate

markdown_extensions:
  - admonition
  - tables
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Configuration: configuration.md
  - Architecture: architecture.md
  - Development: development.md
  - End-to-End Testing: e2e-testing.md
  - Cluster E2E Testing: cluster-e2e-testing.md
  - API Reference: api-reference.md
  - Quality: quality.md
