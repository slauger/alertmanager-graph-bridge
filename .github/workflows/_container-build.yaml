name: container-build

on:
  workflow_call:
    inputs:
      image:
        description: Fully qualified image name
        required: true
        type: string
      dockerfile:
        description: Path to the Containerfile
        required: true
        type: string
      context:
        description: Build context directory
        required: false
        type: string
        default: .
      platforms:
        description: Target platforms
        required: false
        type: string
        default: linux/amd64,linux/arm64
      push:
        description: Whether to push the image
        required: false
        type: boolean
        default: false
      tag:
        description: Image tag (defaults to the short commit SHA)
        required: false
        type: string
        default: ""
      sign:
        description: Whether to sign the pushed image with cosign
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  hadolint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint Containerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ${{ inputs.dockerfile }}
          config: .hadolint.yaml

  build:
    runs-on: ubuntu-latest
    needs: hadolint
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve image tag
        id: meta
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        if: ${{ inputs.push }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          platforms: ${{ inputs.platforms }}
          push: ${{ inputs.push }}
          tags: ${{ inputs.image }}:${{ steps.meta.outputs.tag }}
          build-args: |
            VERSION=${{ steps.meta.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install cosign
        if: ${{ inputs.push && inputs.sign }}
        uses: sigstore/cosign-installer@v3

      - name: Sign image
        if: ${{ inputs.push && inputs.sign }}
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE: ${{ inputs.image }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"
