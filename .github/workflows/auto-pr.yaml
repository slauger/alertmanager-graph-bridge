name: auto-pr

on:
  workflow_run:
    workflows:
      - ci
    types:
      - completed
    branches:
      - develop

permissions:
  contents: read

jobs:
  auto-pr:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create or update develop into main pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./hack/auto-pr.sh
