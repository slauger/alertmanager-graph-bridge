suite: deployment
templates:
  - deployment.yaml
  - configmap.yaml
tests:
  - it: renders a Deployment with the default replica count
    template: deployment.yaml
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: spec.replicas
          value: 1

  - it: uses the configured image repository and tag
    template: deployment.yaml
    set:
      image.tag: "1.2.3"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: ghcr.io/slauger/alertmanager-graph-bridge:1.2.3

  - it: falls back to the latest tag when the chart carries the 0.0.0 placeholder
    template: deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: ghcr.io/slauger/alertmanager-graph-bridge:latest

  - it: injects the Azure client secret from a Secret
    template: deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[0].name
          value: AGB_AZURE_CLIENTSECRET

  - it: mounts the config volume read-only
    template: deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].volumeMounts[0].readOnly
          value: true

  - it: runs as a non-root user with a read-only root filesystem
    template: deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.securityContext.runAsNonRoot
          value: true
      - equal:
          path: spec.template.spec.containers[0].securityContext.readOnlyRootFilesystem
          value: true

  - it: exposes liveness and readiness probes on the http port
    template: deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.path
          value: /healthz
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.port
          value: http
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.path
          value: /readyz
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.port
          value: http
      - equal:
          path: spec.template.spec.containers[0].ports[0].name
          value: http
