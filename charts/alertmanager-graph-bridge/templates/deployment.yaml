apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "alertmanager-graph-bridge.fullname" . }}
  labels:
    {{- include "alertmanager-graph-bridge.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "alertmanager-graph-bridge.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "alertmanager-graph-bridge.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "alertmanager-graph-bridge.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          image: {{ include "alertmanager-graph-bridge.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - -config
            - /etc/alertmanager-graph-bridge/config.yaml
          env:
            - name: AGB_AZURE_CLIENTSECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "alertmanager-graph-bridge.secretName" . }}
                  key: clientSecret
            - name: AGB_SERVER_BEARERTOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "alertmanager-graph-bridge.secretName" . }}
                  key: bearerToken
                  optional: true
          ports:
            - name: http
              containerPort: {{ .Values.config.server.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/alertmanager-graph-bridge
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: {{ include "alertmanager-graph-bridge.fullname" . }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
